<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join a School — Zolyn</title>
<link rel="stylesheet" href="base.css">
<style>
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 24px;
    background: var(--white);
    border-bottom: 1px solid var(--line);
  }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; color: var(--slate); text-decoration: none; }
  .topbar .seal { width: 34px; height: 34px; font-size: 0.95rem; margin-left: auto; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 44px 24px 80px; }

  .page-head { margin-bottom: 28px; }
  .page-head .eyebrow { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; display: block; }
  .page-head h1 { font-size: 1.6rem; margin-bottom: 8px; }

  .search-box { position: relative; margin-bottom: 24px; }
  .search-box input {
    width: 100%; padding: 14px 16px 14px 44px;
    border: 1.5px solid var(--line); border-radius: var(--radius-sm);
    background: var(--white); font-size: 1rem;
  }
  .search-box input:focus { border-color: var(--gold); outline: none; }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--slate-light); }

  .school-list { display: flex; flex-direction: column; gap: 12px; }
  .school-item {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px;
  }
  .school-logo {
    width: 42px; height: 42px; border-radius: 8px;
    background: var(--parchment-deep);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-weight: 700; color: var(--ink);
    flex-shrink: 0;
  }
  .school-info { flex: 1; min-width: 0; }
  .school-info h4 { font-size: 0.98rem; margin: 0 0 2px; }
  .school-info p { font-size: 0.82rem; margin: 0; }
  .school-action { flex-shrink: 0; }
  .school-action .btn { padding: 9px 16px; font-size: 0.85rem; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--slate-light); font-size: 0.9rem; }
  .empty-state .icon { font-size: 2rem; margin-bottom: 10px; display: block; }
</style>
</head>
<body>

<div class="topbar">
  <a href="guest-home.html" class="back-link">← Back</a>
  <div class="seal">Z</div>
</div>

<div class="wrap">
  <div class="page-head">
    <span class="eyebrow">Join a school</span>
    <h1>Find your school</h1>
    <p>Search for your school by name. Requesting to join sends a notification to that school's admin for approval.</p>
  </div>

  <div class="search-box">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search school name…" autocomplete="off">
  </div>

  <div class="school-list" id="resultsList">
    <div class="empty-state">
      <span class="icon">⌕</span>
      Start typing to find your school.
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { searchSchools, requestToJoinSchool, getMyPendingRequests } from './schools.service.js';
  import { getAccessProfile } from './rbac.js';
  import { supabase } from './supabaseClient.js';

  let pendingSchoolIds = new Set();
  let debounceTimer = null;

  function showToast(message, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show' + (type ? ' toast-' + type : '');
    setTimeout(() => { toast.classList.remove('show'); }, 4000);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function initials(name) {
    return name.split(' ').filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  (async () => {
    const profile = await getAccessProfile();
    if (!profile) {
      window.location.href = 'index.html';
      return;
    }
    const { requests } = await getMyPendingRequests();
    (requests || []).forEach(r => pendingSchoolIds.add(r.school_id));
  })();

  document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(debounceTimer);
    const query = e.target.value.trim();

    if (!query) {
      document.getElementById('resultsList').innerHTML = `
        <div class="empty-state"><span class="icon">⌕</span>Start typing to find your school.</div>`;
      return;
    }

    debounceTimer = setTimeout(() => runSearch(query), 350);
  });

  async function runSearch(query) {
    const listEl = document.getElementById('resultsList');
    listEl.innerHTML = `<div class="empty-state">Searching…</div>`;

    const { schools, error } = await searchSchools(query);

    if (error) {
      listEl.innerHTML = `<div class="empty-state">Something went wrong. Try again.</div>`;
      return;
    }

    if (!schools || schools.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><span class="icon">—</span>No schools found matching "${escapeHtml(query)}".</div>`;
      return;
    }

    listEl.innerHTML = schools.map(s => `
      <div class="card school-item" data-school-id="${s.id}">
        <div class="school-logo">${s.logo_url ? `<img src="${s.logo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">` : initials(s.name)}</div>
        <div class="school-info">
          <h4>${escapeHtml(s.name)}</h4>
          <p>${escapeHtml(s.address || '')}</p>
        </div>
        <div class="school-action">
          ${pendingSchoolIds.has(s.id)
            ? `<span class="badge badge-pending">Requested</span>`
            : `<button class="btn btn-ghost join-btn" data-id="${s.id}">Request to join</button>`}
        </div>
      </div>
    `).join('');

    listEl.querySelectorAll('.join-btn').forEach(btn => {
      btn.addEventListener('click', () => handleJoinRequest(btn));
    });
  }

  async function handleJoinRequest(btn) {
    const schoolId = btn.dataset.id;
    const schoolName = btn.closest('.school-item')?.querySelector('h4')?.textContent || 'this school';

    const { data: { user } } = await supabase.auth.getUser();
    const { data: myProfile } = await supabase
      .from('user_profiles')
      .select('full_name')
      .eq('id', user.id)
      .single();

    let myName = myProfile?.full_name || '';
    const enteredName = prompt(
      `Requesting to join ${schoolName}.\n\nThis is the name the school admin will see on your request — confirm or correct it:`,
      myName
    );

    if (enteredName === null) return; // cancelled
    const trimmedName = enteredName.trim();
    if (!trimmedName) {
      showToast('Please enter your name to continue.', 'error');
      return;
    }

    // If the name changed, save it back to their profile too
    if (trimmedName !== myName) {
      await supabase.from('user_profiles').update({ full_name: trimmedName }).eq('id', user.id);
    }

    btn.disabled = true;
    btn.textContent = 'Sending…';

    const { error } = await requestToJoinSchool(schoolId);

    if (error) {
      btn.disabled = false;
      btn.textContent = 'Request to join';
      showToast(error.message || 'Could not send request.', 'error');
      return;
    }

    pendingSchoolIds.add(schoolId);
    btn.outerHTML = `<span class="badge badge-pending">Requested</span>`;
    showToast('Request sent. You\'ll gain access once approved.', 'success');
  }
</script>

</body>
</html>
