<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Admin — Zolyn</title>
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="dash-shell">
  <aside class="dash-sidebar">
    <div class="dash-brand"><div class="seal">Z</div><div class="dash-brand-name">Zolyn</div></div>
    <nav class="dash-nav" id="navLinks">
      <a href="dashboard-teacher-admin.html" class="active">Overview</a>
      <!-- Links added dynamically based on granted permissions -->
    </nav>
    <div class="dash-user">
      <div class="dash-user-name" id="sidebarUserName">—</div>
      <div class="dash-user-role">Teacher Admin</div>
      <button class="dash-logout" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <button class="menu-btn" id="mobileMenuBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="seal">Z</div>
        <button class="dash-logout" id="logoutBtnMobile">Log out</button>
      </div>
    </div>

    <div class="mobile-nav-overlay" id="mobileNavOverlay">
      <div class="mobile-nav-panel">
        <button class="mobile-nav-close" id="mobileNavClose"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        <div class="dash-brand"><div class="seal">Z</div><div class="dash-brand-name">Zolyn</div></div>
        <nav class="dash-nav">
      <a href="dashboard-teacher-admin.html" class="active">Overview</a>
        </nav>
        <div class="dash-user">
          <div class="dash-user-name" id="mobileSidebarUserName">—</div>
          <div class="dash-user-role">Teacher Admin</div>
        </div>
      </div>
    </div>
    <div class="dash-content">
      <div class="dash-page-head">
        <h1>Welcome back</h1>
        <p>Your access here is set by your School Admin. What you see reflects your granted permissions.</p>
      </div>

      <div class="card" style="padding:32px;">
        <h3 style="margin-bottom:16px; font-size:1.05rem;">Your permissions</h3>
        <div id="permissionsList" style="display:flex; flex-direction:column; gap:10px;"></div>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { requireRole, hasPermission } from './rbac.js';
  import { wireMobileNav } from './mobile-nav.js';
  import { logOut } from './auth.js';
  import { supabase } from './supabaseClient.js';

  const PERMISSION_LABELS = {
    manage_students: 'Manage students',
    manage_teachers: 'Manage teachers',
    manage_classes: 'Manage classes',
    manage_subjects: 'Manage subjects',
    enter_results: 'Enter results',
    approve_results: 'Approve results',
    generate_report_cards: 'Generate report cards',
    manage_attendance: 'Manage attendance',
  };

  (async () => {
    const profile = await requireRole('teacher_admin');
    if (!profile) return;

    const { data: { user } } = await supabase.auth.getUser();
    const { data: userProfile } = await supabase.from('user_profiles').select('full_name').eq('id', user.id).single();
    document.getElementById('sidebarUserName').textContent = userProfile?.full_name || 'Teacher Admin';
    document.getElementById('mobileSidebarUserName').textContent = userProfile?.full_name || 'Teacher Admin';
    wireMobileNav();

    const membership = profile.memberships.find(m => m.role === 'teacher_admin');
    renderPermissions(membership);
  })();

  function renderPermissions(membership) {
    const listEl = document.getElementById('permissionsList');
    const granted = Object.entries(PERMISSION_LABELS).filter(([key]) => hasPermission(membership, key));

    if (granted.length === 0) {
      listEl.innerHTML = `<p style="margin:0; color: var(--slate-light); font-size:0.88rem;">No permissions have been granted yet. Contact your School Admin.</p>`;
      return;
    }

    listEl.innerHTML = granted.map(([, label]) => `
      <div style="display:flex; align-items:center; gap:10px; font-size:0.9rem;">
        <span style="color: var(--success); font-weight:700;">✓</span> ${label}
      </div>
    `).join('');
  }

  async function handleLogout() { await logOut(); window.location.href = 'index.html'; }
  document.getElementById('logoutBtn').addEventListener('click', handleLogout);
  document.getElementById('logoutBtnMobile').addEventListener('click', handleLogout);
</script>
</body>
</html>
